name: Build Plugin

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v4

      - name: 安裝 Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 安裝 Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 編譯插件
        run: gradle build

      - name: 上傳 Jar
        uses: actions/upload-artifact@v4
        with:
          name: AIPlugin
          path: build/libs/*.jar
