name: Build Plugin

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v4

      - name: 安裝 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 編譯
        run: ./gradlew build

      - name: 上傳 jar
        uses: actions/upload-artifact@v4
        with:
          name: AIPlugin
          path: build/libs/*.jar
